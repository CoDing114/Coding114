    <h1><a href="./Ajax_fetch.html">WEB</a> </h1>
    <div></div>
    <pre><code>
        fetch(name).then(function(response){ 
            response.text().then(function(text){
            document.queryselector('article').innerHTML=text;
            })
        });
    } 

    fetch() : 서버로 부터 요청한다
    then()  : Asynchronous (비동기) 
    response: 웹서버가 응답한 결과 값
    </code></pre>
    <ol id="nav"></oL>
    <article id="contents"></article>
    <script>
        function fetchPage2(name){
            fetch(name).then(function(response){ 
                response.text().then(function(text){
                document.getElementById('contents').innerHTML=text;
                })
            });
        }
        if(location.hash){
            fetchPage2(location.hash.substr(2));
        } else{
            fetchPage2('data/welcome');
        } 
        fetch('data/list').then(function(response){ 
            response.text().then(function(text){
            document.getElementById('nav').innerHTML=text;
            })
        });
    </script>
